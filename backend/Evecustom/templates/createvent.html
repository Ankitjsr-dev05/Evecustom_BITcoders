{% load static %}
<html>
<head>
    <title>Create Event</title>

    <link rel="stylesheet"  href="{% static 'css/join.css' %}">
       
</head>

<body>

<div class="container">

    <h1>CREATE EVENT</h1>
    <h2>Create a New Event</h2>
    <form  method="post">
    {% csrf_token %}
    <label>Event Name:</label>
    <input type="text" name="name" id="name" required>

    <label>Description:</label>
    <input type="text" name="description" id="description" required>

    <label>Start Date & Time:</label>
    <input type="datetime-local" name="start_datetime" id="start_datetime" required> <br><br>

    <label>End Date & Time:</label>
    <input type="datetime-local" name="end_datetime" id="end_datetime" required><br><br>

    <label>Location:</label>
    <input type="text" name="location" id="location" required><br><br>

    <label>Prize Details:</label>
    <input type="text" name="prize_details" id="prize_details" required><br>


    <button>verify</button>

    </form>

</div>

</body>
</html>
