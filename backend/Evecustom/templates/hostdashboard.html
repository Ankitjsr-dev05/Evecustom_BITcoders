{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/hostdashboard.css' %}">
</head>

<body>

    <div class='header'>
        <a href='#'>Home</a>

        <select name="Events" id="Events">
            <option value="upcoming">Upcoming Events</option>
            <option value="past">Past Events</option>
            <option value="Live">Live Events</option>
        </select>

        <a href="#">
            <h4 class='c'>About Us</h4>
        </a>
        <a href="#">
            <h4 class='d'>Contact Us</h4>
        </a>

        <button type="button">Create Event</button>
        <button type="button">Logout</button>
    </div>


    <div id="container" style="display: flex; align-items: stretch;">

        <div class="box1" style="width: 650px; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
            <h2>My profile</h2>
            <img src="{% static 'images/profile.png' %}" alt="Profile Picture"
                style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px;">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="John Doe" readonly
                style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
            <label for="phone">Phone number:</label>
            <input type="tel" id="phone" name="phone" value="123-456-7890" readonly
                style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="john.doe@example.com" readonly
                style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
        </div>


        <div class="right-box" style="width: 1300px; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">

            <div class="event-title">
                <h2>Event status</h2>
            </div>

            <div id="eventview" class="box2">
                <div class="eventbox">
                    <h3>Event 1</h3>
                    <p>Status: Upcoming</p>
                    <button type="button">View</button>
                </div>
                <div class="eventbox">
                    <h3>Event 2</h3>
                    <p>Status: Live</p>
                    <button type="button">View</button>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
